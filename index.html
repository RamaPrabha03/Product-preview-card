<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Product Preview Card</title>
</head>
<body>
    <main class="product-card">
        <div class="product-image">
            <picture>
                <source media="(max-width: 600px)" srcset="img/image-product-mobile.jpg">
                <img src="img/image-product-desktop.jpg" alt="Gabrielle Chanel Perfume">
            </picture>
        </div>

        <div class="product-content">
            <p class="category">P E R F U M E</p>
            <h1>Gabrielle Essence Eau De Parfum</h1>
            <p class="description">
                A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.
            </p>

            <div class="price-container">
                <span class="current-price">$149.99</span>
                <span class="old-price">$169.99</span>
            </div>

            <button class="add-to-cart">
                <img src="img/icon-cart.svg" alt=""> Add to Cart
            </button>
        </div>
    </main>
</body>
</html>
